<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的书签管理器</title>
  <style>
    :root {
      --color-bg-primary: #ffffff;
      --color-bg-secondary: #f5f5f5;
      --color-bg-tertiary: #fafafa;
      --color-bg-card: #f8f9fa;
      --color-bg-hover: #f8f9fa;
      --color-bg-hover-strong: #e9ecef;
      --color-bg-active: #e3f2fd;
      --color-bg-overlay: rgba(0, 0, 0, 0.5);
      --color-text-primary: #333;
      --color-text-secondary: #666;
      --color-text-muted: #999;
      --color-text-dim: #6c757d;
      --color-border-primary: #e0e0e0;
      --color-border-secondary: #d0d0d0;
      --color-border-light: #f0f0f0;
      --color-border-hover: #b0b0b0;
      --color-accent-blue: #4285f4;
      --color-accent-blue-hover: #3367d6;
      --color-accent-red: #ea4335;
      --color-accent-red-hover: #d33b2c;
      --color-accent-green: #34a853;
      --color-accent-green-text: #2e7d32;
      --color-accent-orange-text: #e65100;
      --color-accent-red-text: #c62828;
      --color-focus-ring: rgba(66, 133, 244, 0.2);
      --color-shadow: rgba(0, 0, 0, 0.1);
      --color-shadow-heavy: rgba(0, 0, 0, 0.3);
      --color-input-bg: white;
      --color-mark-bg: #ffeb3b;
      --color-mark-text: #333;
      --color-status-ok-bg: #e8f5e9;
      --color-status-ok-text: #2e7d32;
      --color-status-warn-bg: #fff3e0;
      --color-status-warn-text: #e65100;
      --color-status-error-bg: #ffebee;
      --color-status-error-text: #c62828;
      --color-info-bg: #f0f7ff;
      --color-info-border: #b3d4fc;
      --color-edit-hover-bg: #fff3cd;
      --color-edit-hover-border: #ffc107;
      --color-delete-hover-bg: #f8d7da;
      --color-delete-hover-border: #dc3545;
      --color-delete-hover-text: #721c24;
      --color-hide-hover-bg: #d1ecf1;
      --color-hide-hover-border: #17a2b8;
      --color-hide-hover-text: #0c5460;
      --color-hidden-tag-bg: #fff3e0;
      --color-hidden-tag-border: #ffcc80;
      --color-hidden-tag-text: #e65100;
      --color-duplicate-keep-bg: #e8f5e9;
      --color-duplicate-keep-text: #2e7d32;
      --color-progress-bg: #e0e0e0;
      --color-toggle-hover: #d0d0d0;
      --color-accent-control: #4285f4;
    }

    [data-theme="dark"] {
      --color-bg-primary: #1e1e2e;
      --color-bg-secondary: #181825;
      --color-bg-tertiary: #1e1e2e;
      --color-bg-card: #313244;
      --color-bg-hover: #313244;
      --color-bg-hover-strong: #45475a;
      --color-bg-active: #1a3a6e;
      --color-bg-overlay: rgba(0, 0, 0, 0.7);
      --color-text-primary: #cdd6f4;
      --color-text-secondary: #a6adc8;
      --color-text-muted: #6c7086;
      --color-text-dim: #7f849c;
      --color-border-primary: #313244;
      --color-border-secondary: #45475a;
      --color-border-light: #313244;
      --color-border-hover: #585b70;
      --color-accent-blue: #89b4fa;
      --color-accent-blue-hover: #74c7ec;
      --color-accent-red: #f38ba8;
      --color-accent-red-hover: #eba0ac;
      --color-accent-green: #a6e3a1;
      --color-accent-green-text: #a6e3a1;
      --color-accent-orange-text: #fab387;
      --color-accent-red-text: #f38ba8;
      --color-focus-ring: rgba(137, 180, 250, 0.3);
      --color-shadow: rgba(0, 0, 0, 0.3);
      --color-shadow-heavy: rgba(0, 0, 0, 0.5);
      --color-input-bg: #313244;
      --color-mark-bg: #665e00;
      --color-mark-text: #ffeb3b;
      --color-status-ok-bg: #1a3a2a;
      --color-status-ok-text: #a6e3a1;
      --color-status-warn-bg: #3a2a1a;
      --color-status-warn-text: #fab387;
      --color-status-error-bg: #3a1a1a;
      --color-status-error-text: #f38ba8;
      --color-info-bg: #1a2a3e;
      --color-info-border: #2a4a6e;
      --color-edit-hover-bg: #3a3420;
      --color-edit-hover-border: #f9e2af;
      --color-delete-hover-bg: #3a2020;
      --color-delete-hover-border: #f38ba8;
      --color-delete-hover-text: #f38ba8;
      --color-hide-hover-bg: #1a3a3e;
      --color-hide-hover-border: #94e2d5;
      --color-hide-hover-text: #94e2d5;
      --color-hidden-tag-bg: #3a2a1a;
      --color-hidden-tag-border: #fab387;
      --color-hidden-tag-text: #fab387;
      --color-duplicate-keep-bg: #1a3a2a;
      --color-duplicate-keep-text: #a6e3a1;
      --color-progress-bg: #45475a;
      --color-toggle-hover: #585b70;
      --color-accent-control: #89b4fa;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --color-bg-primary: #1e1e2e;
        --color-bg-secondary: #181825;
        --color-bg-tertiary: #1e1e2e;
        --color-bg-card: #313244;
        --color-bg-hover: #313244;
        --color-bg-hover-strong: #45475a;
        --color-bg-active: #1a3a6e;
        --color-bg-overlay: rgba(0, 0, 0, 0.7);
        --color-text-primary: #cdd6f4;
        --color-text-secondary: #a6adc8;
        --color-text-muted: #6c7086;
        --color-text-dim: #7f849c;
        --color-border-primary: #313244;
        --color-border-secondary: #45475a;
        --color-border-light: #313244;
        --color-border-hover: #585b70;
        --color-accent-blue: #89b4fa;
        --color-accent-blue-hover: #74c7ec;
        --color-accent-red: #f38ba8;
        --color-accent-red-hover: #eba0ac;
        --color-accent-green: #a6e3a1;
        --color-accent-green-text: #a6e3a1;
        --color-accent-orange-text: #fab387;
        --color-accent-red-text: #f38ba8;
        --color-focus-ring: rgba(137, 180, 250, 0.3);
        --color-shadow: rgba(0, 0, 0, 0.3);
        --color-shadow-heavy: rgba(0, 0, 0, 0.5);
        --color-input-bg: #313244;
        --color-mark-bg: #665e00;
        --color-mark-text: #ffeb3b;
        --color-status-ok-bg: #1a3a2a;
        --color-status-ok-text: #a6e3a1;
        --color-status-warn-bg: #3a2a1a;
        --color-status-warn-text: #fab387;
        --color-status-error-bg: #3a1a1a;
        --color-status-error-text: #f38ba8;
        --color-info-bg: #1a2a3e;
        --color-info-border: #2a4a6e;
        --color-edit-hover-bg: #3a3420;
        --color-edit-hover-border: #f9e2af;
        --color-delete-hover-bg: #3a2020;
        --color-delete-hover-border: #f38ba8;
        --color-delete-hover-text: #f38ba8;
        --color-hide-hover-bg: #1a3a3e;
        --color-hide-hover-border: #94e2d5;
        --color-hide-hover-text: #94e2d5;
        --color-hidden-tag-bg: #3a2a1a;
        --color-hidden-tag-border: #fab387;
        --color-hidden-tag-text: #fab387;
        --color-duplicate-keep-bg: #1a3a2a;
        --color-duplicate-keep-text: #a6e3a1;
        --color-progress-bg: #45475a;
        --color-toggle-hover: #585b70;
        --color-accent-control: #89b4fa;
      }
    }

    [data-theme="dark"] {
      color-scheme: dark;
    }
    [data-theme="dark"] ::-webkit-scrollbar {
      width: 8px;
      background: var(--color-bg-secondary);
    }
    [data-theme="dark"] ::-webkit-scrollbar-thumb {
      background: var(--color-border-secondary);
      border-radius: 4px;
    }
    [data-theme="dark"] ::-webkit-scrollbar-thumb:hover {
      background: var(--color-border-hover);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--color-bg-secondary);
      margin: 0;
      padding: 0;
      color: var(--color-text-primary);
      font-size: 14px;
      line-height: 1.4;
    }

    .container {
      max-width: 100%;
      margin: 0;
      background: var(--color-bg-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: var(--color-bg-primary);
      border-bottom: 1px solid var(--color-border-primary);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 500;
      margin: 0;
      color: var(--color-text-primary);
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .toolbar {
      padding: 16px 24px;
      background: var(--color-bg-tertiary);
      border-bottom: 1px solid var(--color-border-primary);
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      flex-shrink: 0;
      position: sticky;
      top: 73px; /* header height + border */
      z-index: 99;
    }

    .search-box {
      flex: 1;
      min-width: 300px;
      padding: 8px 12px;
      border: 1px solid var(--color-border-secondary);
      border-radius: 4px;
      font-size: 14px;
      background: var(--color-input-bg);
      color: var(--color-text-primary);
      transition: border-color 0.2s;
    }

    .search-box:focus {
      outline: none;
      border-color: var(--color-accent-blue);
      box-shadow: 0 0 0 2px var(--color-focus-ring);
    }

    .filter-select {
      padding: 8px 12px;
      border: 1px solid var(--color-border-secondary);
      border-radius: 4px;
      font-size: 14px;
      background: var(--color-input-bg);
      color: var(--color-text-primary);
      cursor: pointer;
      transition: border-color 0.2s;
      min-width: 120px;
    }

    .filter-select:focus {
      outline: none;
      border-color: var(--color-accent-blue);
      box-shadow: 0 0 0 2px var(--color-focus-ring);
    }

    .btn {
      padding: 8px 16px;
      border: 1px solid var(--color-border-secondary);
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 400;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
    }

    .btn:hover {
      background: var(--color-bg-hover);
      border-color: var(--color-border-hover);
    }

    .btn-primary {
      background: var(--color-accent-blue);
      color: white;
      border-color: var(--color-accent-blue);
    }

    .btn-primary:hover {
      background: var(--color-accent-blue-hover);
      border-color: var(--color-accent-blue-hover);
    }

    .btn-danger {
      background: var(--color-accent-red);
      color: white;
      border-color: var(--color-accent-red);
    }

    .btn-danger:hover {
      background: var(--color-accent-red-hover);
      border-color: var(--color-accent-red-hover);
    }

    .content {
      flex: 1;
      padding: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .stats {
      display: flex;
      gap: 24px;
      padding: 16px 24px;
      background: var(--color-bg-card);
      border-bottom: 1px solid var(--color-border-primary);
      flex-shrink: 0;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-number {
      font-size: 16px;
      font-weight: 500;
      color: var(--color-accent-blue);
    }

    .stat-label {
      font-size: 14px;
      color: var(--color-text-secondary);
    }

    .main-content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: 300px;
      background: var(--color-bg-card);
      border-right: 1px solid var(--color-border-primary);
      overflow-y: auto;
      flex-shrink: 0;
    }

    .folder-tree {
      padding: 8px 0;
    }

    .folder-item {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      cursor: pointer;
      transition: background-color 0.1s;
      border-left: 3px solid transparent;
    }

    .folder-item:hover {
      background-color: var(--color-bg-hover-strong);
    }

    .folder-item.active {
      background-color: var(--color-bg-active);
      border-left-color: var(--color-accent-blue);
    }

    .folder-toggle {
      width: 16px;
      height: 16px;
      margin-right: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 2px;
      transition: background-color 0.2s;
      font-size: 12px;
      color: var(--color-text-secondary);
    }

    .folder-toggle:hover {
      background-color: var(--color-toggle-hover);
    }

    .folder-icon {
      margin-right: 8px;
      font-size: 16px;
    }

    .folder-name {
      flex: 1;
      font-size: 14px;
      color: var(--color-text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .folder-children {
      margin-left: 16px;
    }

    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 16px 24px;
      background: var(--color-bg-primary);
      border-bottom: 1px solid var(--color-border-primary);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-title-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .panel-title {
      font-size: 16px;
      font-weight: 500;
      color: var(--color-text-primary);
      margin: 0;
    }

    .panel-actions {
      display: flex;
      gap: 8px;
    }

    .bookmark-tree {
      flex: 1;
      background: var(--color-bg-primary);
      overflow-y: auto;
      overflow-x: hidden;
      min-height: 0;
    }

    .bookmark-item {
      display: flex;
      align-items: center;
      padding: 8px 24px;
      border-bottom: 1px solid var(--color-border-light);
      transition: background-color 0.1s;
      min-height: 40px;
    }

    .bookmark-item:hover {
      background-color: var(--color-bg-hover);
    }

    .bookmark-item:last-child {
      border-bottom: none;
    }

    /* 拖动排序样式 */
    .bookmark-item {
      cursor: move;
      transition: all 0.2s ease;
    }

    .bookmark-item.dragging {
      opacity: 0.5;
      transform: rotate(5deg);
      z-index: 1000;
      position: relative;
    }

    .bookmark-item.drag-over {
      border-top: 3px solid var(--color-accent-blue);
      background-color: var(--color-bg-active);
    }

    .bookmark-item.drag-over-bottom {
      border-bottom: 3px solid var(--color-accent-blue);
      background-color: var(--color-bg-active);
    }

    .drag-handle {
      width: 16px;
      height: 16px;
      margin-right: 8px;
      cursor: move;
      opacity: 0.3;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--color-text-secondary);
    }

    .bookmark-item:hover .drag-handle {
      opacity: 0.7;
    }

    .bookmark-item.dragging .drag-handle {
      opacity: 1;
    }

    .bookmark-item.folder-item {
      cursor: move;
      background-color: var(--color-bg-card);
    }

    .bookmark-item.folder-item:hover {
      background-color: var(--color-bg-hover-strong);
    }

    .bookmark-item.folder-item .bookmark-content {
      cursor: pointer;
    }

    .bookmark-item.folder-item.active {
      background-color: var(--color-bg-active);
      border-left: 3px solid var(--color-accent-blue);
    }

    .bookmark-icon {
      width: 16px;
      height: 16px;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .bookmark-content {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      position: relative;
    }

    .bookmark-title {
      font-weight: 400;
      color: var(--color-text-primary);
      text-decoration: none;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-right: 120px; /* 为按钮留出空间 */
    }

    .bookmark-title:hover {
      color: var(--color-accent-blue);
    }

    .bookmark-url {
      color: var(--color-text-secondary);
      font-size: 13px;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex-shrink: 0;
      margin-right: 140px; /* 为按钮留出更多空间 */
    }

    .bookmark-actions {
      display: flex;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.2s;
      flex-shrink: 0;
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      background: var(--color-bg-primary);
      padding: 6px;
      border-radius: 4px;
      box-shadow: 0 2px 8px var(--color-shadow);
    }

    .bookmark-item:hover .bookmark-actions {
      opacity: 1;
    }

    .action-btn {
      padding: 4px 8px;
      border: 1px solid var(--color-border-secondary);
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
    }

    .action-btn:hover {
      background: var(--color-bg-hover);
      border-color: var(--color-border-hover);
    }

    .action-btn-edit:hover {
      background: var(--color-edit-hover-bg);
      border-color: var(--color-edit-hover-border);
    }

    .action-btn-delete:hover {
      background: var(--color-delete-hover-bg);
      border-color: var(--color-delete-hover-border);
      color: var(--color-delete-hover-text);
    }

    .action-btn-hide:hover {
      background: var(--color-hide-hover-bg);
      border-color: var(--color-hide-hover-border);
      color: var(--color-hide-hover-text);
    }

    .hidden-bookmark {
      opacity: 0.6;
      background-color: var(--color-bg-card);
    }

    .hidden-bookmark .bookmark-title {
      color: var(--color-text-dim);
    }

    .hidden-folder {
      opacity: 0.6;
      background-color: var(--color-bg-card);
    }

    .hidden-folder .folder-name {
      color: var(--color-text-dim);
    }

    /* 搜索高亮样式 */
    mark {
      background-color: var(--color-mark-bg);
      color: var(--color-mark-text);
      padding: 1px 2px;
      border-radius: 2px;
    }

    /* 配置对话框样式 */
    .modal {
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: var(--color-bg-overlay);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: var(--color-bg-primary);
      border-radius: 8px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 4px 20px var(--color-shadow-heavy);
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--color-border-primary);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-header h3 {
      margin: 0;
      font-size: 18px;
      font-weight: 500;
    }

    .close {
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      color: var(--color-text-secondary);
    }

    .close:hover {
      color: var(--color-text-primary);
    }

    .modal-body {
      padding: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--color-text-primary);
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--color-border-secondary);
      border-radius: 4px;
      font-size: 14px;
      background: var(--color-input-bg);
      color: var(--color-text-primary);
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--color-accent-blue);
      box-shadow: 0 0 0 2px var(--color-focus-ring);
    }

    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--color-border-secondary);
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      background: var(--color-input-bg);
      color: var(--color-text-primary);
      transition: border-color 0.2s;
      resize: vertical;
    }

    /* 导入书签样式 */
    .import-info {
      margin-bottom: 16px;
      padding: 12px 16px;
      background: var(--color-info-bg);
      border: 1px solid var(--color-info-border);
      border-radius: 6px;
      font-size: 13px;
      color: var(--color-text-primary);
      line-height: 1.6;
    }

    .linkcheck-controls {

<body>
  <!-- 密码锁定遮罩 -->
  <div id="passwordLockOverlay" style="display:none;position:fixed;z-index:10000;left:0;top:0;width:100%;height:100%;background:var(--color-bg-secondary);justify-content:center;align-items:center;flex-direction:column;">
    <div style="text-align:center;padding:2em;">
      <h2 style="color:var(--color-accent-blue);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;margin-bottom:0.3em;" data-i18n="password.lock.title">🔒 密码保护</h2>
      <p style="color:var(--color-text-secondary);font-size:14px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;margin-bottom:1.2em;" data-i18n="password.lock.desc">书签管理器已启用密码保护，请输入密码以继续访问。</p>
      <input type="password" id="lockPasswordInput" placeholder="请输入密码" data-i18n-placeholder="password.lock.placeholder" style="width:260px;padding:0.5em 0.8em;border:1px solid var(--color-border-secondary);border-radius:6px;font-size:14px;text-align:center;margin-bottom:0.5em;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:var(--color-input-bg);color:var(--color-text-primary);" />
      <div id="lockPasswordError" style="color:var(--color-accent-red);font-size:13px;min-height:1.5em;margin-bottom:0.5em;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;"></div>
      <button type="button" id="lockPasswordSubmit" style="width:260px;padding:0.5em 0;background:var(--color-accent-blue);color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer;transition:background 0.2s;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;" data-i18n="password.lock.submit">解锁</button>
    </div>
  </div>
  <!-- 主内容（默认隐藏，密码验证通过后显示） -->
  <div class="container" id="mainContent" style="display:none;">
    <div class="header">
      <h1 data-i18n="manager.header">书签管理器</h1>
      <div class="header-actions">
        <button class="btn" id="themeToggle" title="切换主题" data-i18n-title="theme.toggle">
          <span id="themeIcon">🖥️</span>
        </button>
        <button class="btn" id="configBtn" data-i18n="manager.config">⚙️ 配置</button>
        <button class="btn" id="refreshBtn" data-i18n="btn.refresh">🔄 刷新</button>
      </div>
    </div>

    <div class="toolbar">
      <input type="text" class="search-box" id="searchInput" placeholder="搜索书签..." data-i18n-placeholder="manager.searchPlaceholder">
      <select class="filter-select" id="filterSelect">
        <option value="all" data-i18n="manager.filterAll">显示所有</option>
        <option value="visible" data-i18n="manager.filterVisible">只显示可见</option>
        <option value="hidden" data-i18n="manager.filterHidden">只显示隐藏</option>
      </select>
      <button class="btn" id="exportBtn" data-i18n="btn.export">📤 导出</button>
      <button class="btn" id="importBtn" data-i18n="btn.import">📥 导入</button>
      <button class="btn" id="detectDuplicatesBtn" data-i18n="manager.detectDuplicates">🔍 检测重复</button>
      <button class="btn" id="linkCheckBtn" data-i18n="manager.linkCheck">🔗 检测失效链接</button>
      <input type="file" id="importFileInput" accept=".json" style="display: none;">
    </div>

    <div class="content">
      <div class="stats" id="statsContainer">
        <div class="stat-item">
          <span class="stat-number" id="totalBookmarks">0</span>
          <span class="stat-label" data-i18n="manager.statBookmarks">书签</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" id="totalFolders">0</span>
          <span class="stat-label" data-i18n="manager.statFolders">文件夹</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" id="recentBookmarks">0</span>
          <span class="stat-label" data-i18n="manager.statRecent">最近添加</span>
        </div>
      </div>

      <div class="main-content">
        <div class="sidebar">
          <div class="folder-tree" id="folderTree">
            <div class="loading" data-i18n="manager.loading">加载中...</div>
          </div>
        </div>

        <div class="main-panel">
          <div class="panel-header">
            <div class="panel-title-section">
              <button class="back-button" id="backButton" style="display: none;">
                <span class="back-icon">←</span>
                <span class="back-text" data-i18n="btn.back">返回</span>
              </button>
              <h3 class="panel-title" id="panelTitle" data-i18n="manager.selectFolder">选择文件夹</h3>
            </div>
            <div class="panel-actions">
            </div>
          </div>
          <div class="bookmark-tree" id="bookmarkTree">
            <div class="empty-state">
              <h3 data-i18n="manager.selectFolderHint">选择一个文件夹</h3>
              <p data-i18n="manager.selectFolderDesc">从左侧选择一个文件夹来查看其中的书签</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 配置对话框 -->
  <div id="configModal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3 data-i18n="manager.giteeConfig">Gitee 仓库配置</h3>
        <span class="close" id="closeConfigModal">&times;</span>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="giteeOwner" data-i18n="manager.giteeOwner">Gitee 用户名:</label>
          <input type="text" id="giteeOwner" placeholder="输入你的Gitee用户名" data-i18n-placeholder="manager.giteeOwnerPlaceholder">
        </div>
        <div class="form-group">
          <label for="giteeRepo" data-i18n="manager.giteeRepo">仓库名:</label>
          <input type="text" id="giteeRepo" placeholder="输入仓库名" data-i18n-placeholder="manager.giteeRepoPlaceholder">
        </div>
        <div class="form-group">
          <label for="giteeToken" data-i18n="manager.giteeToken">访问令牌:</label>
          <input type="password" id="giteeToken" placeholder="输入你的Gitee访问令牌" data-i18n-placeholder="manager.giteeTokenPlaceholder">
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="saveConfigBtn" data-i18n="btn.save">保存配置</button>
          <button class="btn" id="cancelConfigBtn" data-i18n="btn.cancel">取消</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 编辑书签对话框 -->
  <div id="editModal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="editModalTitle" data-i18n="manager.editBookmark">编辑书签</h3>
        <span class="close" id="closeEditModal">&times;</span>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editBookmarkId">
        <div class="form-group">
          <label for="editBookmarkTitle" data-i18n="manager.editTitle">标题:</label>
          <input type="text" id="editBookmarkTitle" placeholder="输入书签标题" data-i18n-placeholder="manager.editTitlePlaceholder">
        </div>
        <div class="form-group" id="editUrlGroup">
          <label for="editBookmarkUrl" data-i18n="manager.editUrl">URL:</label>
          <textarea id="editBookmarkUrl" placeholder="输入书签URL" data-i18n-placeholder="manager.editUrlPlaceholder" rows="3"></textarea>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="saveEditBtn" data-i18n="btn.save">保存配置</button>
          <button class="btn" id="cancelEditBtn" data-i18n="btn.cancel">取消</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 导入书签对话框 -->
  <div id="importModal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3 data-i18n="manager.importBookmarks">导入书签</h3>
        <span class="close" id="closeImportModal">&times;</span>
      </div>
      <div class="modal-body">
        <div class="import-info" id="importInfo"></div>
        <div class="import-options">
          <label class="import-option">
            <input type="radio" name="importMode" value="overwrite" checked>
            <span data-i18n="manager.importOverwrite">覆盖导入 - 用导入数据完全替换当前书签</span>
          </label>
          <label class="import-option">
            <input type="radio" name="importMode" value="merge">
            <span data-i18n="manager.importMerge">合并导入 - 将导入数据与当前书签合并</span>
          </label>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="confirmImportBtn" data-i18n="manager.importConfirm">确认导入</button>
          <button class="btn" id="cancelImportBtn" data-i18n="btn.cancel">取消</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 重复书签检测对话框 -->
  <div id="duplicateModal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 800px;">
      <div class="modal-header">
        <h3 data-i18n="manager.duplicateTitle">重复书签检测</h3>
        <span class="close" id="closeDuplicateModal">&times;</span>
      </div>
      <div class="modal-body">
        <!-- 模式切换 -->
        <div class="duplicate-mode-bar">
          <label>
            <input type="radio" name="duplicateMode" value="url" checked>
            <span data-i18n="manager.duplicateUrlMode">URL 精确匹配</span>
          </label>
          <label>
            <input type="radio" name="duplicateMode" value="title">

          </label>

            <input type="checkbox" id="stripQueryParam">
            <span data-i18n="manager.duplicateStripQuery">忽略查询参数</span>
          </label>
        </div>

        <div class="duplicate-stats" id="duplicateStats" style="display: none;"></div>

          <button class="btn" id="duplicateSelectAllBtn" data-i18n="manager.duplicateSelectAll">全选</button>
          <button class="btn" id="duplicateDeselectAllBtn" data-i18n="manager.duplicateDeselectAll">取消全选</button>
        </div>
        <!-- 结果列表 -->
        <div id="duplicateResults" style="max-height: 400px; overflow-y: auto; border: 1px solid var(--color-border-primary); border-radius: 6px;"></div>
        <!-- 操作按钮 -->
        <div class="form-actions">
          <button class="btn btn-danger" id="deleteDuplicatesBtn" style="display: none;" data-i18n="manager.duplicateDeleteSelected">删除选中 (0)</button>
          <button class="btn" id="cancelDuplicateBtn" data-i18n="btn.cancel">取消</button>
        </div>
      </div>
    </div>

  <!-- 失效链接检测对话框 -->
  <div id="linkCheckModal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 900px;">
      <div class="modal-header">
        <h3 data-i18n="manager.linkCheckTitle">失效链接检测</h3>
        <span class="close" id="closeLinkCheckModal">&times;</span>
      </div>
      <div class="modal-body">
        <!-- 工具栏：开始/停止 + 并发数 + 筛选 -->
        <div class="linkcheck-toolbar">
          <button class="btn btn-primary" id="linkCheckStartBtn" data-i18n="manager.linkCheckStart">开始检测</button>
          <button class="btn" id="linkCheckStopBtn" style="display:none;" data-i18n="manager.linkCheckStop">停止检测</button>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;">

              <option value="5">5</option>
              <option value="8" selected>8</option>

          <select id="linkCheckFilter" style="margin-left:auto;">
            <option value="all" data-i18n="manager.linkCheckFilterAll">全部</option>
            <option value="error" data-i18n="manager.linkCheckFilterBroken">仅失效</option>
            <option value="warning" data-i18n="manager.linkCheckFilterWarning">仅警告</option>
            <option value="ok" data-i18n="manager.linkCheckFilterOk">仅可用</option>
          </select>
        </div>
        <!-- 进度条 -->
        <div class="linkcheck-progress" id="linkCheckProgress" style="display:none;">
          <div class="linkcheck-progress-bar">
            <div class="linkcheck-progress-fill" id="linkCheckProgressFill" style="width:0%;"></div>
          </div>
          <div class="linkcheck-progress-text">
            <span id="linkCheckProgressText"></span>
            <span id="linkCheckProgressPercent"></span>
          </div>
        </div>
        <!-- 统计信息 -->
        <div class="linkcheck-stats" id="linkCheckStats" style="display:none;"></div>
        <!-- 全选/取消全选 -->
        <div class="linkcheck-controls" id="linkCheckControls" style="display:none;">
          <button class="btn" id="linkCheckSelectAllBrokenBtn" data-i18n="manager.linkCheckSelectAllBroken">选中所有失效</button>
          <button class="btn" id="linkCheckDeselectAllBtn" data-i18n="manager.linkCheckDeselectAll">取消全选</button>
        </div>
        <!-- 结果列表 -->
        <div id="linkCheckResults" style="max-height: 400px; overflow-y: auto; border: 1px solid var(--color-border-primary); border-radius: 6px;"></div>
        <!-- 操作按钮 -->
        <div class="form-actions">
          <button class="btn btn-danger" id="deleteBrokenLinksBtn" style="display:none;" data-i18n="manager.linkCheckDeleteSelected">删除选中 (0)</button>
          <button class="btn" id="cancelLinkCheckBtn" data-i18n="btn.cancel">取消</button>
        </div>
      </div>
    </div>
  </div>

  <script src="bookmark-manager.js"></script>
</body>
</html>
